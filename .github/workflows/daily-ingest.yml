name: Daily Bill Ingest

on:
  schedule:
    # 매일 00:00 KST (= UTC 15:00 전날)
    - cron: '0 15 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest API
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/bills/ingest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | jq .

  notify:
    runs-on: ubuntu-latest
    needs: ingest
    steps:
      # 수집 완료 후 1분 대기
      - name: Wait for analysis
        run: sleep 60

      - name: Send daily briefing
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/notify" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | jq .
